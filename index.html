<!DOCTYPE html>
<html>
<head>
    <title>Magic 8-Ball</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-top: 50px;
        }
        #ball {
            width: 300px;
            height: 300px;
            background-color: black;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 10px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }
        #ball:active {
            transform: scale(0.95) rotate(5deg);
        }
        #window {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #3d3d5c, #000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #answer {
            color: #66ccff;
            font-weight: bold;
            font-size: 18px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>The Magic 8-Ball</h1>
    <p>Think of a "Yes" or "No" question, then shake the ball!</p>

    <div id="ball" onclick="shakeBall()">
        <div id="window">
            <div id="answer">8</div>
        </div>
    </div>

    <br>
    <button onclick="shakeBall()">SHAKE</button>

    <script>
        function shakeBall() {
            const answers = [
                "Yes, definitely!",
                "Maybe...",
                "Ask again later",
                "Don't count on it",
                "It is certain",
                "Outlook not so good",
                "Most likely",
                "My sources say no"
            ];
            
            const randomAnswer = answers[Math.floor(Math.random() * answers.length)];
            const answerDisplay = document.getElementById("answer");
            
            // Add a little delay to look like it's thinking
            answerDisplay.innerHTML = "...";
            setTimeout(() => {
                answerDisplay.innerHTML = randomAnswer;
            }, 500);
        }
    </script>

</body>
</html>
